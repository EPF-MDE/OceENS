<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mon App – Connexion</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f3f4f6;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 48px 40px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      text-align: center;
      max-width: 420px;
      width: 100%;
    }
    .logo { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 24px; color: #111; margin-bottom: 8px; }
    p  { color: #666; margin-bottom: 32px; font-size: 15px; }

    .btn-microsoft {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: #0078d4;
      color: white;
      text-decoration: none;
      padding: 12px 24px;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 500;
      transition: background 0.2s;
    }
    .btn-microsoft:hover { background: #005fa3; }
    .btn-microsoft svg { flex-shrink: 0; }

    .already-logged { margin-top: 24px; padding: 16px; background: #f0fdf4; border-radius: 8px; }
    .already-logged a { color: #0078d4; text-decoration: none; font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🏢</div>
    <h1>Bienvenue</h1>
    <p>Connectez-vous avec votre compte d'entreprise Microsoft.</p>

    {% if user %}
      <div class="already-logged">
        Vous êtes connecté en tant que <strong>{{ user.name }}</strong><br>
        <a href="/dashboard">Aller au tableau de bord →</a>
      </div>
    {% else %}
      <a href="/login" class="btn-microsoft">
        <svg width="20" height="20" viewBox="0 0 21 21" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="1" y="1" width="9" height="9" fill="#F25022"/>
          <rect x="11" y="1" width="9" height="9" fill="#7FBA00"/>
          <rect x="1" y="11" width="9" height="9" fill="#00A4EF"/>
          <rect x="11" y="11" width="9" height="9" fill="#FFB900"/>
        </svg>
        Se connecter avec Microsoft
      </a>
    {% endif %}
  </div>
</body>
</html>
