<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OcéEns – Plateforme d'évaluation des enseignements</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet" />

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --red: #D42B2B;
            --navy: #1E2340;
            --purple: #4A3060;
            --grey: #6B7280;
            --white: #FFFFFF;
        }

        body {
            font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #ffffff;
            color: #333333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Définition de l'animation */
        @keyframes slide {
            0% {
                background-position: center top;
            }

            50% {
                background-position: center bottom;
            }

            100% {
                background-position: center top;
            }
        }

        /* ── Top Header ─────────────────────────────── */
        header {
            background-image: url('/static/img/hautpage.png');
            height: 100px;
            position: relative;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 100;

            animation: slide 6s ease-in-out infinite;

        }

        .hero {
            padding-top: 30px;
            padding-bottom: 30px;

        }

        .header-logo {
            height: 70px;
            object-fit: contain;
            position: absolute;
            bottom: -40px;
            left: 20px;
            transform: none;

        }

        .header-user {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #333;
            background: transparent;
        }

        .header-user svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* ── Main Content Area (Hero) ────────────────── */
        main {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-top: 10px;

        }

        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 0;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            background: rgba(255, 255, 255, 0.4);
            padding: 40px 60px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            max-width: 90%;
        }

        /* Si l'image 'fond_accueil.png' contient déjà le flou et qu'il n'y a pas
           de boite translucide dans la maquette, on peut enlever le fond blanc ci-dessus
           en rendant l'arrière plan transparent. La maquette montre le texte directement
           sur le flou. Modifions le fond de .hero-content : */
        .hero-content {
            background: transparent;
            box-shadow: none;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            padding: 20px;
        }

        /* ── Title ───────────────────────────────────── */
        .logo-title {
            font-size: 5.5rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .text-red {
            color: #df231d;
        }

        .text-purple {
            color: #470a68;
        }

        .logo-subtitle {
            font-size: 1.15rem;
            font-weight: 500;
            color: #111111;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 70px;
        }

        /* ── Buttons ─────────────────────────────────── */
        .hero-actions {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .hero-btn {
            display: inline-block;
            padding: 16px 40px;
            font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
            width: 200px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
            border: none;
        }

        .hero-btn-purple {
            background-color: #470a68;
            /* Bleu foncé similaire à la maquette */
            color: #ffffff;
        }

        .hero-btn-purple:hover {
            background-color: #470a68;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(13, 71, 161, 0.3);
        }


        /* ── Responsive ──────────────────────────── */
        @media (max-width: 768px) {
            .logo-title {
                font-size: 4rem;
            }

            .logo-subtitle {
                font-size: 0.9rem;
            }

            .hero-btn {
                padding: 14px 30px;
                font-size: 0.95rem;
                width: 100%;
            }

            header {
                padding: 0 20px;
                height: 70px;
            }
        }
    </style>
</head>

<body>

    <header>
        <img src="/static/img/logo.png" alt="EPF Engineering School" class="header-logo">
    </header>

    <main>
        <div class="hero-bg"></div>
        <div class="hero-content">
            <h1 class="logo-title">
                <span class="text-red">Océ</span><span class="text-purple">Ens</span>
            </h1>
            <p class="logo-subtitle" style="text-transform:none;">Plateforme d'évaluation des enseignements</p>
            <div class="hero-actions">

                <a href="/login" class="hero-btn hero-btn-purple">
                    Connexion
                </a>
            </div>
        </div>
    </main>

</body>

</html>
