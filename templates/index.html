<!DOCTYPE html>
<html lang="fr">
 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OcéEns II — Connexion</title>
    <meta name="description" content="OcéEns II — Plateforme de sondages et évaluation des enseignements">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        /* Conservation de tout votre style original */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
 
        body {
            font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #ffffff;
            color: #333333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }
 
        @keyframes slide {
            0% { background-position: center top; }
            50% { background-position: center bottom; }
            100% { background-position: center top; }
        }
 
        header {
            background-image: url('/static/img/hautpage.png');
            height: 100px;
            position: relative;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 100;
            animation: slide 6s ease-in-out infinite;
        }
 
        .header-logo {
            height: 70px;
            object-fit: contain;
            position: absolute;
            bottom: -40px;
            left: 20px;
        }
 
        main {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-top: 10px;
        }
 
        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
 
        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            background: transparent;
            padding: 20px;
            max-width: 90%;
        }
 
        .logo-title {
            font-size: 5.5rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
 
        .text-red { color: #df231d; }
        .text-purple { color: #470a68; }
 
        .logo-subtitle {
            font-size: 1.15rem;
            font-weight: 500;
            color: #111111;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 70px;
        }
 
        .hero-actions {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
 
        .hero-btn {
            display: inline-block;
            padding: 16px 40px;
            font-family: 'Inter', sans-serif;
            width: 200px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
            border: none;
        }
 
        .hero-btn-purple {
            background-color: #470a68;
            color: #ffffff;
        }
 
        .hero-btn-purple:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(71, 10, 104, 0.3);
        }
 
        @media (max-width: 768px) {
            .logo-title { font-size: 4rem; }
            .logo-subtitle { font-size: 0.9rem; }
            .hero-btn { width: 100%; }
        }
    </style>
</head>
 
<body>
 
    <header>
        <img src="/static/img/logo.png" alt="EPF Engineering School" class="header-logo">
    </header>
 
    <main>
        <div class="hero-bg"></div>
        <div class="hero-content">
            <h1 class="logo-title">
                <span class="text-red">Océ</span><span class="text-purple">Ens</span>
            </h1>
            <p class="logo-subtitle" style="text-transform:none;">Plateforme de sondages et évaluation</p>
            
            <div class="hero-actions">
                <!-- Le bouton pointe maintenant vers /login avec le style violet défini -->
                <a href="/login" class="hero-btn hero-btn-purple">Se connecter</a>
            </div>
        </div>
    </main>
 
</body>
 
</html>
