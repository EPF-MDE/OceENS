<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Étudiant - {{ user.name }} - OcéEns</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@500;600&family=Montserrat:wght@400;500;600;700&display=swap"
    rel="stylesheet" />

  <style>
    /* === 1. RESET & VARIABLES (Copié de l'index) === */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      /* Variables de couleur copiées de l'index */
      --red: #df231d;
      --purple: #470a68;
    }

    body {
      font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #ffffff;
      color: #333333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* === 2. HEADER  === */

    header {
      background-color: var(--purple);
      /* Utilise la variable purple */
      color: white;
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
    }

    header .brand {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    header .school-logo {
      height: 40px;
      /* Taille du logo EPF */
      width: auto;
      display: block;
    }

    header nav {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 14px;
    }

    header nav .user-email {
      opacity: 0.9;
    }

    /* Style du bouton déconnexion conservé */
    header nav a.logout-btn {
      color: white;
      text-decoration: none;
      padding: 6px 16px;
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 6px;
      transition: background 0.2s ease;
      font-weight: 500;
    }

    header nav a.logout-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    /* === 3. MAIN  === */
    main {
      flex: 1;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding-top: 10px;
      margin: 60px auto;
      /* Espace sous le header */
    }

    /* La boite centrale translucide */
    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
      background: rgba(255, 255, 255, 0.4);
      padding: 50px 70px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
      max-width: 90%;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* === 3.1 Grix Logo OcéEns (Copié de l'index) === */
    .logo-title {
      font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 5.5rem;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 5px;
    }

    /* === 3.2 Sous-titre (Copié de l'index) === */
    .logo-subtitle {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.15rem;
      font-weight: 500;
      color: #111111;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 70px;
    }

    /* Couleurs du logo */
    .text-red {
      color: var(--red);
    }

    .text-purple {
      color: var(--purple);
    }

    /* === 3.3 Zone Questionnaire === */

    .incentive-text {
      text-align: center;
      margin-bottom: 30px;
    }

    .incentive-text h1 {
      font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 26px;
      font-weight: 600;
      color: #111111;
      margin-bottom: 8px;
    }

    .incentive-text p.welcome {
      color: #666;
      font-size: 16px;
      margin-bottom: 0;
    }

    /* Zone centrée du bouton */
    .questionnaire-section {
      display: flex;
      justify-content: center;
    }

    .questionnaire-btn {
      display: inline-block;
      padding: 16px 40px;
      font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
      width: 340px;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 50px;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(249, 115, 22, 0.2);
      /* Ombre orange douce */
      border: none;

      /* MODIFICATION  */
      background-color: var(--red);
      color: #ffffff;
      /* Texte blanc */
      text-align: center;
    }

    .questionnaire-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(249, 115, 22, 0.3);
    }


    /* === 5. RESPONSIVE  === */
    @media (max-width: 768px) {
      .logo-title {
        font-size: 3.5rem;
      }

      .logo-subtitle {
        font-size: 0.9rem;
      }

      .incentive-text h1 {
        font-size: 22px;
      }

      .hero-content {
        padding: 30px 20px;
      }

      .questionnaire-btn {
        width: 100%;
        padding: 14px 30px;
        font-size: 1rem;
      }

      header {
        padding: 0 16px;
      }

      .header-school-logo {
        height: 36px;
      }

      header nav span.user-email {
        display: none;
      }

      /* Cache l'email sur mobile */
    }
  </style>
</head>

<body>

  <header>
    <div class="brand">
      <img src="/static/img/epf_logo_blanc.png" alt="EPF Logo" class="school-logo">
    </div>

    <nav>
      <span class="user-email">{{ user.email }}</span>
      <a href="/logout" class="logout-btn">Déconnexion</a>
    </nav>
  </header>

  <main>
    <div class="hero-content">
      <h1 class="logo-title">
        <span class="text-red">Océ</span><span class="text-purple">Ens</span>
      </h1>
      <p class="logo-subtitle" style="text-transform:none;">Plateforme d'évaluation des enseignements</p>

      <section class="questionnaire-section-with-incentive">

        <div class="incentive-text">
          <h1>Bonjour, {{ user.name }} </h1>
          <p class="welcome">Merci de compléter le questionnaire de fin de semestre pour le cours suivant :</p>
        </div>

        <div class="questionnaire-section">
          <a href="/questionnaire" class="questionnaire-btn"></a>
        </div>

      </section>

    </div>
  </main>

</body>

</html>
