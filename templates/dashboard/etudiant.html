<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Étudiant - {{ user.name }} - OcéEns</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@500;600&family=Montserrat:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', path='css/etudiant.css') }}" />
</head>

<body>

  <header>
    <div class="brand">
      <img src="/static/img/epf_logo.png" alt="EPF Logo" class="school-logo">
    </div>

    <nav>
      <span class="user-email">{{ user.email }}</span>
      <a href="/logout" class="logout-btn">Déconnexion</a>
    </nav>
  </header>

  <div class="banner">
    <div>
      <div class="banner-badge">Étudiant</div>
      <div class="banner-greeting">Bonjour, {{ user.name }} !</div>
    </div>
  </div>

  <main>
    <div class="hero-content">
      <h1 class="logo-title">
        <span class="text-red">Océ</span><span class="text-purple">Ens</span>
      </h1>
      <p class="logo-subtitle" style="text-transform:none;">Plateforme d'évaluation des enseignements</p>

      <section class="questionnaire-section-with-incentive">

        <div class="incentive-text">
          <p class="welcome" id="incentive-message">Chargement de votre questionnaire...</p>
        </div>

        <div class="questionnaire-section">
          <!-- Carte d'identité du questionnaire (formation / semestre) -->
          <div id="questionnaire-card" class="questionnaire-card" style="display:none;">
            <div id="questionnaire-card-icon" class="questionnaire-card-icon">📋</div>
            <div class="questionnaire-card-text">
              <div id="questionnaire-card-formation" class="questionnaire-card-formation"></div>
              <div id="questionnaire-card-meta" class="questionnaire-card-meta"></div>
            </div>
          </div>

          <button id="questionnaire-btn" class="questionnaire-btn loading" disabled>
            Chargement...
          </button>
        </div>

      </section>

    </div>
  </main>

  <script>
    const ALL_USERS = null; // placeholder retiré si non utilisé ici
  </script>
  <script src="{{ url_for('static', path='js/etudiant.js') }}"></script>
</body>

</html>
